services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-agent-bench-postgres
    environment:
      POSTGRES_DB: multi_agent_bench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent_bench"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

